<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tìm Vị Trí</title>
    <style>
        :root {
            /* Light, fresh color palette */
            --bg-color: #f2f2f7;
            /* Apple specific light gray background */
            --panel-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1c1c1e;
            --text-secondary: #8e8e93;
            --text-muted: #aeaeb2;
            --accent: #007aff;
            --accent-green: #34c759;
            --danger: #ff3b30;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --input-border: #e5e5ea;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-user-select: none;
            user-select: none;
            /* Subtly animated background gradient */
            background: linear-gradient(135deg, #f2f2f7 0%, #ffffff 100%);
        }

        /* Top panel containing inputs - Floating Card Style */
        .controls-panel {
            background: var(--panel-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            padding: calc(env(safe-area-inset-top, 20px) + 15px) 20px 20px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            z-index: 10;
            border-radius: 0 0 24px 24px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            background: #ffffff;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-main);
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        button.primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        button.primary-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(0, 122, 255, 0.2);
        }

        /* Main compass area */
        .compass-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .distance-display {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
            text-align: center;
            line-height: 1;
            color: var(--text-main);
            transition: color 0.3s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .distance-unit {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-left: 2px;
        }

        .accuracy-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.04);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .accuracy-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
        }

        .arrow-container {
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* Premium glass ring around the compass */
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.2) 100%);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
        }

        .arrow {
            width: 160px;
            height: 160px;
            /* Subtle gradient for the arrow */
            fill: #3a3a3c;
            transform-origin: center center;
            transition: transform 0.1s linear, fill 0.3s, filter 0.3s, transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.15));
            transform: rotate(0deg);
            will-change: transform;
        }

        /* The glow effect when pointing correctly */
        .arrow-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(52, 199, 89, 0);
            transition: box-shadow 0.4s ease;
            pointer-events: none;
        }

        .arrow-container.aligned::after {
            box-shadow: 0 0 40px rgba(52, 199, 89, 0.3);
        }

        /* Arrival pulse effect */
        .arrival-pulse {
            display: none;
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, var(--accent-green) 0%, #28a745 100%);
            border-radius: 50%;
            position: absolute;
            animation: pulseLight 1.5s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(52, 199, 89, 0.4);
        }

        .arrival-pulse svg {
            width: 70px;
            height: 70px;
            fill: white;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        @keyframes pulseLight {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.5);
            }

            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 25px rgba(52, 199, 89, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(52, 199, 89, 0);
            }
        }

        /* Overlay for permissions */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .overlay-icon {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 12px 24px rgba(0, 122, 255, 0.3);
        }

        .overlay-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .overlay h2 {
            margin-bottom: 12px;
            font-size: 28px;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .overlay p {
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
            font-size: 16px;
            max-width: 300px;
        }

        .status-text {
            position: absolute;
            bottom: max(env(safe-area-inset-bottom, 30px), 30px);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            transform: translateX(-50%);
            left: 50%;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <!-- Permissions Overlay -->
    <div class="overlay" id="startOverlay">
        <div class="overlay-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L22 22L12 18L2 22L12 2Z" />
            </svg>
        </div>
        <h2>La Bàn Bắt Đầu</h2>
        <p>Để chỉ dẫn đến mục tiêu, ứng dụng cần sử dụng GPS và Cảm biến hướng của thiết bị.</p>
        <button class="primary-btn" id="btnStart"
            style="background: var(--accent); max-width: 250px; font-size: 18px; padding: 16px;">Cho phép & Bắt
            đầu</button>
    </div>

    <!-- Controls -->
    <div class="controls-panel">
        <div class="input-group">
            <input type="text" id="targetLat" placeholder="Vĩ độ (VD: 21.0285)">
            <input type="number" id="targetLng" placeholder="Kinh độ (VD: 105.8542)" step="any">
        </div>
        <button class="primary-btn" id="btnSetTarget">Dẫn đường đến Tọa độ</button>
    </div>

    <!-- Compass Area -->
    <div class="compass-area">
        <div class="distance-display" id="distanceContainer">
            <span id="distanceValue">--</span><span class="distance-unit" id="distanceUnit">m</span>
        </div>

        <div class="accuracy-text" id="accuracyText" style="display: none;">
            <div class="accuracy-dot" id="accuracyDot"></div>
            <span>Độ chính xác GPS: -- m</span>
        </div>

        <div class="arrow-container" id="arrowContainer">
            <!-- Navigation Arrow pointing UP by default -->
            <!-- We use a slightly more elegant sharp arrowhead here -->
            <svg class="arrow" id="directionArrow" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 8 L85 85 L50 68 L15 85 Z" />
            </svg>

            <!-- Arrival Checkmark (Hidden by default) -->
            <div class="arrival-pulse" id="arrivalPulse" style="display: none;">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" />
                </svg>
            </div>
        </div>
    </div>

    <div class="status-text" id="statusText">Đang chờ vị trí...</div>

    <script>
        // DOM Elements
        const overlay = document.getElementById('startOverlay');
        const btnStart = document.getElementById('btnStart');
        const btnSetTarget = document.getElementById('btnSetTarget');
        const inputLat = document.getElementById('targetLat');
        const inputLng = document.getElementById('targetLng');
        const distanceContainer = document.getElementById('distanceContainer');
        const distanceValue = document.getElementById('distanceValue');
        const distanceUnit = document.getElementById('distanceUnit');
        const accuracyText = document.getElementById('accuracyText');
        const accuracyDot = document.getElementById('accuracyDot');
        const arrowContainer = document.getElementById('arrowContainer');
        const directionArrow = document.getElementById('directionArrow');
        const arrivalPulse = document.getElementById('arrivalPulse');
        const statusText = document.getElementById('statusText');

        // State variables
        let currentLat = null;
        let currentLng = null;
        let currentAccuracy = null;
        let currentHeading = null; // degrees from North (0-360)

        let targetLat = null;
        let targetLng = null;

        let lastRotation = 0; // for smooth interpolation
        let isPointingAtTarget = false; // Haptic state
        let isArrived = false; // Arrival state

        // Auto-split comma-separated coordinates if pasted into the Latitude field
        inputLat.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.includes(',')) {
                const parts = val.split(',');
                if (parts.length >= 2) {
                    inputLat.value = parts[0].trim();
                    inputLng.value = parts[1].trim();
                }
            }
        });

        // Math Helpers
        function toRad(degrees) {
            return degrees * Math.PI / 180;
        }
        function toDeg(radians) {
            return radians * 180 / Math.PI;
        }

        // Calculate distance in meters using Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth radius in meters
            const φ1 = toRad(lat1);
            const φ2 = toRad(lat2);
            const Δφ = toRad(lat2 - lat1);
            const Δλ = toRad(lon2 - lon1);

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                Math.cos(φ1) * Math.cos(φ2) *
                Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        // Calculate bearing in degrees from North (0-360) towards target
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = toRad(lat1);
            const φ2 = toRad(lat2);
            const λ1 = toRad(lon1);
            const λ2 = toRad(lon2);

            const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) -
                Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);

            let bearing = toDeg(Math.atan2(y, x));
            return (bearing + 360) % 360;
        }

        // Vibrate helper
        function vibrate(pattern) {
            if ("vibrate" in navigator) {
                navigator.vibrate(pattern);
            }
        }

        // Update UI components
        function updateUI() {
            if (currentAccuracy !== null) {
                accuracyText.style.display = 'flex';
                accuracyText.querySelector('span').innerText = `Độ chính xác: ±${Math.round(currentAccuracy)}m`;

                // Color code the accuracy dot
                if (currentAccuracy <= 15) {
                    accuracyDot.style.backgroundColor = "var(--accent-green)"; // Excellent
                } else if (currentAccuracy <= 50) {
                    accuracyDot.style.backgroundColor = "#ffcc00"; // Moderate
                } else {
                    accuracyDot.style.backgroundColor = "var(--danger)"; // Poor
                }
            }

            if (currentLat !== null && currentLng !== null && targetLat !== null && targetLng !== null) {

                // --- Distance Calculation ---
                const distanceMeters = calculateDistance(currentLat, currentLng, targetLat, targetLng);

                // --- Arrival Logic (Distance < 10 meters) ---
                if (distanceMeters < 10) {
                    if (!isArrived) {
                        isArrived = true;
                        directionArrow.style.display = 'none';
                        arrivalPulse.style.display = 'flex';
                        distanceContainer.style.color = 'var(--accent-green)';
                        distanceContainer.style.transform = 'scale(1.05)';
                        arrowContainer.classList.add('aligned');
                        vibrate([100, 50, 100, 50, 200]); // Success vibration pattern
                    }
                    distanceValue.innerText = "Đã đến";
                    distanceUnit.innerText = " nơi";
                    statusText.innerText = "Bạn đã đến mục tiêu!";
                    return; // Skip compass updating when arrived
                } else {
                    if (isArrived) {
                        // Left the arrival zone
                        isArrived = false;
                        directionArrow.style.display = 'block';
                        arrivalPulse.style.display = 'none';
                        distanceContainer.style.color = 'var(--text-main)';
                        distanceContainer.style.transform = 'scale(1)';
                    }
                }

                // Update distance text
                if (distanceMeters > 999) {
                    distanceValue.innerText = (distanceMeters / 1000).toFixed(2);
                    distanceUnit.innerText = 'km';
                } else {
                    distanceValue.innerText = Math.round(distanceMeters);
                    distanceUnit.innerText = 'm';
                }

                // --- Bearing & Arrow Rotation ---
                if (currentHeading !== null) {
                    const bearing = calculateBearing(currentLat, currentLng, targetLat, targetLng);

                    // Target rotation for the arrow relative to phone's top (UP)
                    let targetRotation = bearing - currentHeading;

                    // Logic to find shortest path for smooth CSS rotation
                    let diff = targetRotation - (lastRotation % 360);
                    if (diff > 180) diff -= 360;
                    if (diff < -180) diff += 360;

                    lastRotation += diff;

                    // Apply rotation
                    directionArrow.style.transform = `rotate(${lastRotation}deg)`;

                    // Highlight arrow in GREEN when roughly pointing at the target (+- 15 degrees)
                    let pointingError = Math.abs((bearing - currentHeading + 360) % 360);
                    if (pointingError > 180) pointingError = 360 - pointingError;

                    if (pointingError < 15) {
                        directionArrow.style.fill = 'var(--accent-green)';
                        arrowContainer.classList.add('aligned');

                        // Trigger haptic feedback ONCE when entering the "correct" zone
                        if (!isPointingAtTarget) {
                            isPointingAtTarget = true;
                            vibrate([30]); // Short crisp tap
                        }
                    } else {
                        // Default color in light mode is dark gray
                        directionArrow.style.fill = '#3a3a3c';
                        arrowContainer.classList.remove('aligned');
                        isPointingAtTarget = false;
                    }

                    statusText.innerText = `Chệch hướng khoảng ${Math.round(pointingError)}°`;
                } else {
                    statusText.innerText = "Đang định hướng thiết bị...";
                }
            } else if (targetLat === null || targetLng === null) {
                statusText.innerText = "Chờ nhập tọa độ...";
                distanceValue.innerText = "--";
                distanceUnit.innerText = "m";
            } else {
                statusText.innerText = "Đang tìm vị trí hiện tại...";
            }
        }

        // Initialize Geolocation Tracking
        function startTrackingLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLng = position.coords.longitude;
                        currentAccuracy = position.coords.accuracy;
                        updateUI();
                    },
                    (error) => {
                        let msg = "";
                        switch (error.code) {
                            case error.PERMISSION_DENIED: msg = "Bị từ chối Quyền Vị trí."; break;
                            case error.POSITION_UNAVAILABLE: msg = "Không có kết nối GPS."; break;
                            case error.TIMEOUT: msg = "Hết thời gian chờ GPS."; break;
                            default: msg = "Lỗi Vị trí không xác định."; break;
                        }
                        statusText.innerText = msg;
                        statusText.style.color = "var(--danger)";
                    },
                    {
                        enableHighAccuracy: true,
                        maximumAge: 0,
                        timeout: 10000
                    }
                );
            } else {
                statusText.innerText = "Thiết bị không hỗ trợ định vị.";
            }
        }

        // Initialize Device Orientation Tracking (Compass)
        function startTrackingCompass() {
            const handleOrientation = (event) => {
                let heading = null;
                // iOS (webkitCompassHeading)
                if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
                    heading = event.webkitCompassHeading;
                }
                // Android (absolute alpha)
                else if (event.absolute === true && event.alpha !== null) {
                    heading = 360 - event.alpha;
                }
                // General fallback
                else if (event.alpha !== null) {
                    heading = 360 - event.alpha;
                }

                if (heading !== null) {
                    currentHeading = heading;
                    updateUI();
                }
            };

            // Modern standard is ondeviceorientationabsolute, fallback to deviceorientation
            if (window.DeviceOrientationAbsoluteEvent) {
                window.addEventListener("deviceorientationabsolute", handleOrientation, true);
            } else {
                window.addEventListener("deviceorientation", handleOrientation, true);
            }
        }

        // Button Listeners
        btnStart.addEventListener('click', async () => {
            // Ask for iOS 13+ DeviceOrientation permissions explicitly
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        startTrackingCompass();
                    } else {
                        alert("Vui lòng cấp quyền La Bàn để sử dụng chức năng chỉ hướng.");
                        statusText.innerText = "Chưa cấp quyền La bàn.";
                        return; // do not dismiss overlay
                    }
                } catch (error) {
                    console.error("Lỗi xin quyền compass:", error);
                }
            } else {
                // Non-iOS or older devices don't require explicit async permission request
                startTrackingCompass();
            }

            // Start location tracking
            startTrackingLocation();

            // Dismiss overlay smoothly
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
            }, 400);

            // Pre-warm vibrate
            vibrate(1);
        });

        btnSetTarget.addEventListener('click', () => {
            // Replace comma with dot to handle inputs from various locale keyboards
            let valLat = inputLat.value.replace(',', '.');
            let valLng = inputLng.value.replace(',', '.');

            const lat = parseFloat(valLat);
            const lng = parseFloat(valLng);

            if (!isNaN(lat) && !isNaN(lng)) {
                targetLat = lat;
                targetLng = lng;
                // Defocus input fields to hide keyboard on mobile
                inputLat.blur();
                inputLng.blur();
                updateUI();
                // Pop animation for the button
                btnSetTarget.style.transform = 'scale(0.95)';
                setTimeout(() => btnSetTarget.style.transform = 'none', 150);
            } else {
                alert("Định dạng tọa độ không hợp lệ.");
            }
        });

    </script>
</body>

</html>
