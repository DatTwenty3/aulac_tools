<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Bản đồ số Vĩnh Long - AULAC</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/bandoso.css"/>
  <link rel="icon" type="image/png" href="logo/AULAC_CONS.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Bản đồ chiếm trọn màn hình -->
    <div id="map"></div>

    <!-- Panel thông tin vị trí & diện tích real-time khi vẽ chú thích -->
    <div id="drawing-live-info" class="drawing-live-info" style="display: none;" aria-live="polite">
      <div class="drawing-live-row"><span class="drawing-live-label">Vị trí:</span> <span id="drawing-live-position">—</span></div>
      <div class="drawing-live-row" id="drawing-live-area-row"><span class="drawing-live-label">Diện tích:</span> <span id="drawing-live-area">—</span></div>
    </div>

    <!-- Nút toggle thông tin -->
    <button id="info-toggle-btn" class="info-toggle-btn" title="Hiển thị thông tin">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
    </button>

    <!-- Khối thông tin có thể ẩn/hiện -->
    <div id="info-card" class="info-card">
      <div class="info-card-content">
        <div class="brand">
          <img src="logo/AULAC_CONS.png" alt="AULAC Logo" class="brand-logo">
          <div class="brand-text">
            <h1>BẢN ĐỒ SỐ ÂU LẠC</h1>
            <p class="subtitle">Ấp Vĩnh Hưng, Phường Long Đức, Tỉnh Vĩnh Long</p>
          </div>
        </div>
        <div class="info-card-footer">
          <span class="info-footer-badge">Được phát triển bởi LEDAT</span>
          <a href="https://www.facebook.com/harry.twenty3/" target="_blank" class="info-footer-link">
            <svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor"><path d="M29 0h-26c-1.7 0-3 1.3-3 3v26c0 1.7 1.3 3 3 3h13v-12h-4v-5h4v-3.6c0-4.1 2.5-6.4 6.2-6.4 1.8 0 3.6.3 3.6.3v4h-2c-2 0-2.6 1.2-2.6 2.5v3.2h5l-1 5h-4v12h7c1.7 0 3-1.3 3-3v-26c0-1.7-1.3-3-3-3z"/></svg>
            <span>Facebook: <b>harry.twenty3</b></span>
          </a>
        </div>
      </div>
    </div>

    <!-- Nút toggle hộp công cụ -->
    <button id="tools-toggle-btn" class="tools-toggle-btn" title="Mở công cụ">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </button>

    <!-- Hộp công cụ ẩn bên phải -->
    <aside id="tools-panel" class="tools-panel">
      <div class="tools-panel-header">
        <h2 class="tools-panel-title">Công cụ</h2>
        <button id="tools-panel-close" class="tools-panel-close-btn" title="Đóng">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <!-- Tab navigation -->
      <div class="tools-panel-tabs">
        <button class="tools-tab-btn active" data-tab="tools" title="Công cụ bản đồ">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          <span>Công cụ</span>
        </button>
        <button class="tools-tab-btn" data-tab="settings" title="Cài đặt bản đồ">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
            <circle cx="6" cy="6" r="1.5"/>
            <circle cx="6" cy="12" r="1.5"/>
            <circle cx="6" cy="18" r="1.5"/>
          </svg>
          <span>Cài đặt</span>
        </button>
      </div>

      <div class="tools-panel-body">
        <!-- Ngăn Công cụ -->
        <div class="tools-tab-content active" id="tab-tools">
          <!-- Thanh tìm kiếm -->
          <div class="search-bar-modern">
            <div class="search-input-wrapper">
              <input id="search-input" class="search-input-modern" type="text" placeholder="Nhập tên xã/phường, tên đường hoặc tọa độ (lat, lng)..." autocomplete="off">
              <div id="search-suggestions" class="search-suggestions"></div>
            </div>
            <button id="search-btn" class="search-btn-modern">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="vertical-align: middle; margin-right: 4px;"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="2"/><line x1="14.4142" y1="14" x2="18" y2="17.5858" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              <span>Tìm kiếm</span>
            </button>
          </div>

          <!-- Các nút công cụ -->
          <div class="map-tools-container">
            <!-- Nhóm Vị trí -->
            <div class="tool-group">
              <div class="tool-group-header">
                <span class="tool-group-title">Vị trí</span>
              </div>
              <div class="tool-group-content">
                <button id="locate-btn" class="tool-btn locate-btn-custom" title="Xác định vị trí hiện tại của bạn">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                  </svg>
                  <span>Xác định vị trí</span>
                </button>
                <button id="copy-coordinate-btn" class="tool-btn copy-coordinate-btn-custom" title="Xác định tọa độ tại điểm chọn">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="2" x2="12" y2="6"></line>
                    <line x1="12" y1="18" x2="12" y2="22"></line>
                    <line x1="2" y1="12" x2="6" y2="12"></line>
                    <line x1="18" y1="12" x2="22" y2="12"></line>
                  </svg>
                  <span>Xác định tọa độ</span>
                </button>
                <!-- Tùy chọn hệ tọa độ -->
                <div class="coordinate-system-selector">
                  <div class="coordinate-select-wrapper">
                    <label class="coordinate-label">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                      </svg>
                      Hệ tọa độ
                    </label>
                    <select id="coordinate-system-select" class="coordinate-select">
                      <option value="WGS84">🌍 WGS84 (Lat, Lng)</option>
                      <option value="VN2000">📍 VN2000 (X, Y)</option>
                    </select>
                  </div>
                  
                  <div id="province-selector" class="province-selector-wrapper">
                    <label class="coordinate-label">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                      </svg>
                      Tỉnh/Thành phố
                    </label>
                    <select id="province-select" class="coordinate-select province-select">
                      <option value="">-- Chọn tỉnh/thành phố --</option>
                      <option value="An Giang">An Giang (104°45')</option>
                      <option value="Bắc Ninh">Bắc Ninh (107°00')</option>
                      <option value="Cà Mau">Cà Mau (104°30')</option>
                      <option value="Cao Bằng">Cao Bằng (105°45')</option>
                      <option value="Đắk Lắk">Đắk Lắk (108°30')</option>
                      <option value="Điện Biên">Điện Biên (103°00')</option>
                      <option value="Đồng Nai">Đồng Nai (107°45')</option>
                      <option value="Đồng Tháp">Đồng Tháp (105°00')</option>
                      <option value="Gia Lai">Gia Lai (108°15')</option>
                      <option value="Hà Tĩnh">Hà Tĩnh (105°30')</option>
                      <option value="Hưng Yên">Hưng Yên (105°30')</option>
                      <option value="Khánh Hòa">Khánh Hòa (108°15')</option>
                      <option value="Lai Châu">Lai Châu (104°45')</option>
                      <option value="Lạng Sơn">Lạng Sơn (107°15')</option>
                      <option value="Lào Cai">Lào Cai (104°45')</option>
                      <option value="Lâm Đồng">Lâm Đồng (107°45')</option>
                      <option value="Nghệ An">Nghệ An (104°45')</option>
                      <option value="Ninh Bình">Ninh Bình (105°00')</option>
                      <option value="Phú Thọ">Phú Thọ (104°45')</option>
                      <option value="Quảng Ngãi">Quảng Ngãi (108°00')</option>
                      <option value="Quảng Ninh">Quảng Ninh (107°45')</option>
                      <option value="Quảng Trị">Quảng Trị (106°00')</option>
                      <option value="Sơn La">Sơn La (104°00')</option>
                      <option value="Tây Ninh">Tây Ninh (105°45')</option>
                      <option value="Thái Nguyên">Thái Nguyên (106°30')</option>
                      <option value="Thanh Hóa">Thanh Hóa (105°00')</option>
                      <option value="Thành phố Cần Thơ">Thành phố Cần Thơ (105°00')</option>
                      <option value="Thành phố Đà Nẵng">Thành phố Đà Nẵng (107°45')</option>
                      <option value="Thành phố Hà Nội">Thành phố Hà Nội (105°00')</option>
                      <option value="Thành phố Hải Phòng">Thành phố Hải Phòng (105°45')</option>
                      <option value="Thành phố Hồ Chí Minh">Thành phố Hồ Chí Minh (105°45')</option>
                      <option value="Thành phố Huế">Thành phố Huế (107°00')</option>
                      <option value="Tuyên Quang">Tuyên Quang (106°00')</option>
                      <option value="Vĩnh Long">Vĩnh Long (105°30')</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Nhóm Đo lường -->
            <div class="tool-group">
              <div class="tool-group-header">
                <span class="tool-group-title">Đo lường</span>
              </div>
              <div class="tool-group-content">
                <button id="measure-btn" class="tool-btn measure-btn-custom" title="Đo khoảng cách giữa các điểm">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <circle cx="5" cy="12" r="2"></circle>
                    <circle cx="19" cy="12" r="2"></circle>
                    <line x1="3" y1="6" x2="7" y2="6"></line>
                    <line x1="3" y1="8" x2="7" y2="8"></line>
                    <line x1="17" y1="6" x2="21" y2="6"></line>
                    <line x1="17" y1="8" x2="21" y2="8"></line>
                  </svg>
                  <span>Đo khoảng cách</span>
                </button>
                <button id="clear-measure-btn" class="tool-btn clear-measure-btn-custom" style="display: none;" title="Xóa kết quả đo khoảng cách">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                  </svg>
                  <span>Xóa đo</span>
                </button>
                <button id="area-btn" class="tool-btn area-btn-custom" title="Đo diện tích vùng">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                  </svg>
                  <span>Đo diện tích</span>
                </button>
                <button id="clear-area-btn" class="tool-btn clear-area-btn-custom" style="display: none;" title="Xóa kết quả đo diện tích">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                  </svg>
                  <span>Xóa vùng</span>
                </button>
              </div>
            </div>

            <!-- Nhóm Chia sẻ tọa độ -->
            <div class="tool-group">
              <div class="tool-group-header">
                <span class="tool-group-title">Chia sẻ tọa độ</span>
              </div>
              <div class="tool-group-content">
                <button id="select-points-btn" class="tool-btn select-points-btn-custom" title="Chọn các điểm trên bản đồ">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                  </svg>
                  <span>Chọn điểm</span>
                </button>
                <div class="point-naming-option" style="margin-top: 8px; padding: 8px 12px; background: rgba(139, 92, 246, 0.05); border-radius: 8px; display: none;" id="point-naming-option">
                  <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: #6b7280;">
                    <input type="checkbox" id="auto-name-checkbox" checked style="cursor: pointer; width: 16px; height: 16px; accent-color: #8b5cf6;">
                    <span>Tự động đặt tên điểm</span>
                  </label>
                </div>
                <div id="selected-points-info" class="selected-points-info" style="display: none;">
                  <div class="points-count">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/>
                      <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span id="points-count-text">Đã chọn: 0 điểm</span>
                  </div>
                  <div class="points-list" id="points-list">
                    <!-- Danh sách điểm sẽ được thêm động -->
                  </div>
                </div>
                <button id="export-kml-btn" class="tool-btn export-btn-custom" style="display: none;" title="Xuất file KML">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  <span>Xuất KML</span>
                </button>
                <button id="export-kmz-btn" class="tool-btn export-btn-custom" style="display: none;" title="Xuất file KMZ (nén)">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  <span>Xuất KMZ</span>
                </button>
                <button id="clear-points-btn" class="tool-btn clear-points-btn-custom" style="display: none;" title="Xóa tất cả các điểm đã chọn">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                  </svg>
                  <span>Xóa điểm</span>
                </button>
                <input type="file" id="kml-kmz-input" accept=".kml,.kmz" style="display: none;">
                <button id="import-kml-kmz-btn" class="tool-btn export-btn-custom" title="Nhập và hiển thị file KML/KMZ trên bản đồ">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                  </svg>
                  <span>Nhập KML/KMZ</span>
                </button>
                <div id="kml-kmz-import-list" style="margin-top: 8px;"></div>
              </div>
            </div>

            <!-- Nhóm Vẽ chú thích -->
            <div class="tool-group">
              <div class="tool-group-header">
                <span class="tool-group-title">Vẽ chú thích</span>
              </div>
              <div class="tool-group-content" id="drawing-tools-container">
                <!-- Công cụ vẽ -->
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px;">
                  <button id="draw-freehand-btn" class="tool-btn-mini" title="Vẽ tự do">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                      <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                      <path d="M2 2l7.586 7.586"/>
                      <circle cx="11" cy="11" r="2"/>
                    </svg>
                    <span style="font-size: 0.75rem;">Tự do</span>
                  </button>
                  <button id="draw-line-btn" class="tool-btn-mini" title="Vẽ đường gấp khúc (click nhiều điểm, double-click để hoàn thành)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="4 17 8 12 12 17 16 7 20 12"/>
                    </svg>
                    <span style="font-size: 0.75rem;">Đường</span>
                  </button>
                  <button id="draw-arrow-btn" class="tool-btn-mini" title="Vẽ mũi tên">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="5" y1="12" x2="19" y2="12"/>
                      <polyline points="12 5 19 12 12 19"/>
                    </svg>
                    <span style="font-size: 0.75rem;">Mũi tên</span>
                  </button>
                  <button id="draw-polygon-btn" class="tool-btn-mini" title="Vẽ hình đa giác (click nhiều điểm, double-click để hoàn thành)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polygon points="12 2 2 19 12 15 22 19"/>
                    </svg>
                    <span style="font-size: 0.75rem;">Đa giác</span>
                  </button>
                  <button id="draw-circle-btn" class="tool-btn-mini" title="Vẽ hình tròn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/>
                    </svg>
                    <span style="font-size: 0.75rem;">Hình tròn</span>
                  </button>
                  <button id="draw-rectangle-btn" class="tool-btn-mini" title="Vẽ hình chữ nhật (click góc thứ nhất, sau đó click góc đối diện)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="3" y="3" width="18" height="18" rx="0"/>
                    </svg>
                    <span style="font-size: 0.75rem;">Chữ nhật</span>
                  </button>
                  <button id="draw-text-btn" class="tool-btn-mini" title="Thêm chú thích text">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="4 7 4 4 20 4 20 7"/>
                      <line x1="9" y1="20" x2="15" y2="20"/>
                      <line x1="12" y1="4" x2="12" y2="20"/>
                    </svg>
                    <span style="font-size: 0.75rem;">Text</span>
                  </button>
                </div>

                <!-- Màu sắc và độ dày -->
                <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
                  <div style="flex: 1;">
                    <label style="display: block; font-size: 0.8rem; color: #6b7280; margin-bottom: 4px;">Màu sắc</label>
                    <input type="color" id="drawing-color-picker" value="#FF0000" style="width: 100%; height: 36px; border: 2px solid #e5e7eb; border-radius: 6px; cursor: pointer;">
                  </div>
                  <div style="flex: 1;">
                    <label style="display: block; font-size: 0.8rem; color: #6b7280; margin-bottom: 4px;">
                      Độ dày
                    </label>
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <input type="range" id="drawing-weight-slider" class="duan-weight-slider" min="1" max="10" value="3">
                      <span id="drawing-weight-value" class="duan-weight-value">3</span>
                    </div>
                  </div>
                </div>

                <!-- Nút hành động -->
                <div style="display: flex; gap: 6px;">
                  <button id="drawing-undo-btn" class="tool-btn drawing-action-btn" style="flex: 1;" title="Hoàn tác (Undo)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M3 7v6h6"/>
                      <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
                    </svg>
                    <span>Hoàn tác</span>
                  </button>
                  <button id="drawing-clear-btn" class="tool-btn drawing-action-btn" style="flex: 1;" title="Xóa tất cả">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"/>
                      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    <span>Xóa</span>
                  </button>
                  <button id="drawing-export-btn" class="tool-btn drawing-action-btn" style="flex: 1;" title="Xuất file KML">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                      <polyline points="7 10 12 15 17 10"/>
                      <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Xuất KML</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Ngăn Cài đặt -->
        <div class="tools-tab-content" id="tab-settings">
          <!-- Lựa chọn bản đồ nền -->
          <div class="settings-section">
            <div class="settings-section-title">Bản đồ nền</div>
            <div class="layer-control-custom">
              <label class="layer-radio">
                <input type="radio" name="base-layer" value="google-hybrid" checked>
                <span>Google Vệ tinh (Có nhãn)</span>
              </label>

              <label class="layer-radio">
                <input type="radio" name="base-layer" value="google-streets">
                <span>Google Giao thông</span>
              </label>
            </div>
          </div>

          <!-- Ẩn/Hiện ranh giới -->
          <!-- RANH GIỚI XÃ/PHƯỜNG -->
          <div class="settings-section">
            <div class="settings-section-title">RANH GIỚI XÃ/PHƯỜNG</div>
            
            <!-- Nút bật/tắt hiển thị -->
            <button id="toggle-overlay-btn-custom" class="toggle-overlay-btn-custom" style="margin-bottom: 12px;">
              <span class="toggle-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </span>
              <span class="toggle-text">Hiển thị ranh giới</span>
            </button>

            <!-- Các tùy chỉnh -->
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <!-- Độ trong suốt -->
              <div style="display: flex; align-items: center; gap: 10px;">
                <label style="font-size: 0.85em; color: #6b7280; white-space: nowrap; font-weight: 600;">Độ trong suốt:</label>
                <input type="range" id="opacity-slider-custom" min="0" max="1" step="0.05" value="0.4" class="opacity-slider" style="flex: 1;">
                <span id="opacity-value-text" style="font-size: 0.85em; font-weight: 600; color: #1f2937; min-width: 45px; text-align: right;">0.40</span>
              </div>

              <!-- Màu ranh giới -->
              <div style="display: flex; align-items: center; gap: 10px;">
                <label style="font-size: 0.85em; color: #6b7280; white-space: nowrap; font-weight: 600;">Màu ranh giới:</label>
                <input type="color" id="boundary-color-picker" value="#000000" style="width: 50px; height: 35px; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer;">
              </div>
              
              <!-- Độ dày -->
              <div style="display: flex; align-items: center; gap: 10px;">
                <label style="font-size: 0.85em; color: #6b7280; white-space: nowrap; font-weight: 600;">Độ dày:</label>
                <input type="range" id="boundary-weight-slider" min="0.5" max="5" step="0.5" value="0.5" style="flex: 1;">
                <span id="boundary-weight-value" style="font-size: 0.85em; font-weight: 600; color: #1f2937; min-width: 45px; text-align: right;">0.5</span>
              </div>
            </div>
          </div>

          <!-- Quản lý dự án -->
          <div class="settings-section">
            <div class="settings-section-title">Các Dự án</div>
            <div id="duan-files-container" class="duan-files-container">
              <!-- Các file sẽ được thêm động bằng JavaScript -->
            </div>
          </div>
        </div>
      </div>
    </aside>


    <!-- Panel thông tin xã/phường trượt từ bên phải -->
    <aside id="info-panel" class="info-panel">
      <div class="info-panel-header">
        <div>
          <div class="info-panel-label">XÃ/PHƯỜNG</div>
          <h2 id="info-panel-title" class="info-panel-title">Thông tin khu vực</h2>
        </div>
        <button id="info-panel-close" class="info-panel-close-btn" title="Đóng">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div id="info-panel-body" class="info-panel-body">
        <!-- Nội dung sẽ được JS điền khi người dùng chọn xã/phường -->
      </div>
    </aside>

  </div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="js/bandoso.js"></script>
</body>
</html>
